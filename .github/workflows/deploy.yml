name: Build and Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t devops-project .

    - name: Tag Docker Image
      run: |
        docker tag devops-project:latest 805778285513.dkr.ecr.eu-north-1.amazonaws.com/devops-project:latest

    - name: Push Docker Image
      run: |
        docker push 805778285513.dkr.ecr.eu-north-1.amazonaws.com/devops-project:latest

    - name: Verify ECR Push
      run: |
        aws ecr describe-images \
        --repository-name devops-project \
        --region eu-north-1
